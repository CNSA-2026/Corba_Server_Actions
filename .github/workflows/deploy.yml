name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      # Set up Java 8 - CRITICAL: CORBA requires Java 8 (removed from Java 11+)
      - name: Set up JDK 8
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # Verify Java version
      - name: Verify Java Version
        run: java -version

      # Build with Maven (generate CORBA code, compile, package)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Install SSH Key
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2.8.1
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'

      # Add host to known_hosts
      - name: Add Known Hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # Deploy and Start CORBA Server
      - name: Deploy and Start CORBA Server
        run: |
          # Install Java 8 on remote server (if not already installed)
          ssh ubuntu@${{ secrets.SSH_HOST }} "sudo apt-get update && sudo apt-get install -y openjdk-8-jdk"
          
          # Transfer the fat JAR to the remote server
          scp target/corba-buffer-server-1.0.0-jar-with-dependencies.jar ubuntu@${{ secrets.SSH_HOST }}:~/corba-server.jar
          
          # Create startup script on remote server
          ssh ubuntu@${{ secrets.SSH_HOST }} 'cat > ~/start-corba.sh << '"'"'EOF'"'"'
          #!/bin/bash
          set -e
          
          JAVA8_HOME=/usr/lib/jvm/java-8-openjdk-amd64
          PUBLIC_IP=34.69.229.246
          
          # Kill any existing processes
          fuser -k 8081/tcp || true
          pkill orbd || true
          sleep 1
          
          # Start orbd with public IP advertising and proxy settings
          echo "Starting orbd on port 3001 (public IP: $PUBLIC_IP)..."
          nohup $JAVA8_HOME/bin/orbd \
            -ORBInitialPort 3001 \
            -ORBInitialHost $PUBLIC_IP \
            -ORBProxyHost $PUBLIC_IP \
            -ORBProxyPort 3001 \
            -ORBListenEndpoints "giop:tcp://0.0.0.0:3001" \
            > /tmp/orbd.log 2>&1 &
          
          # Wait for orbd to start
          for i in {1..15}; do
            if ss -tuln 2>/dev/null | grep 3001; then
              echo "orbd is listening on port 3001"
              break
            fi
            echo "Waiting for orbd... attempt $i"
            sleep 1
          done
          
          # Verify orbd started
          if ! ss -tuln 2>/dev/null | grep 3001; then
            echo "ERROR: orbd failed to start!"
            cat /tmp/orbd.log
            exit 1
          fi
          
          # Start CORBA Buffer Server with public IP and proxy settings
          echo "Starting CORBA Buffer Server..."
          nohup $JAVA8_HOME/bin/java \
            -Dcom.sun.corba.se.ORBCorbalocResolver.ORBDefaultInitRef="corbaloc::$PUBLIC_IP:3001" \
            -Dcom.sun.corba.se.ORBServerPort=8081 \
            -jar ~/corba-server.jar \
            -ORBInitialHost $PUBLIC_IP \
            -ORBInitialPort 3001 \
            -ORBProxyHost $PUBLIC_IP \
            -ORBProxyPort 3001 \
            > ~/corba-server.log 2>&1 &
          
          # Wait for Buffer Server to register
          sleep 3
          
          echo "✓ CORBA services started successfully"
          EOF
          chmod +x ~/start-corba.sh'
          
          # Run the startup script
          ssh ubuntu@${{ secrets.SSH_HOST }} "~/start-corba.sh"
          
          # Verify services are running
          ssh ubuntu@${{ secrets.SSH_HOST }} "echo '✓ orbd:' && ss -tuln | grep 3001 || echo 'WARNING: orbd not listening' && echo '✓ Processes:' && ps aux | grep -E '(orbd|java.*corba)' | grep -v grep"

      # Optional: Display logs from the server
      - name: Display Server Logs
        if: always()
        run: |
          echo "### CORBA Server Log" >> "$GITHUB_STEP_SUMMARY"
          ssh ubuntu@${{ secrets.SSH_HOST }} "tail -20 ~/corba-server.log || echo 'No log found yet'" >> "$GITHUB_STEP_SUMMARY"
          echo "(Logs appended to GitHub Actions job summary)" >> "$GITHUB_STEP_SUMMARY"
