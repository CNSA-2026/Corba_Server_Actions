name: Docker-Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

  # IMAGE_NAME: "us-east1-docker.pkg.dev/cnsa-2026/docker-repo/corba-actions:latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      # Set up Java 8 - CRITICAL: CORBA requires Java 8 (removed from Java 11+)
      - name: Set up JDK 8
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # Verify Java version
      - name: Verify Java Version
        run: java -version

      # Build with Maven (generate CORBA code, compile, package)
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Docker login to Artifact Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: us-east1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.IMAGE_NAME }} .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ secrets.IMAGE_NAME }}

      # Install SSH Key
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2.8.1
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'

      # Add host to known_hosts
      - name: Add Known Hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # Deploy and Start CORBA Server (Docker)
      - name: Deploy and Start CORBA Server (Docker)
        run: |
          ssh ubuntu@${{ secrets.SSH_HOST }} '
            set -e

            PUBLIC_IP=34.69.229.246
            ORB_PORT=3000
            SERVER_PORT=8080
            IMAGE_NAME=${{ secrets.IMAGE_NAME }}

            # Create network if it does not exist
            docker network create corba-net >/dev/null 2>&1 || true

            # Stop and remove previous containers
            docker stop corba-orbd corba-buffer || true
            docker rm -f corba-orbd corba-buffer || true

            # Login to Artifact Registry (if needed)
            if ! docker info | grep -q us-east1-docker.pkg.dev; then
              echo "${{ secrets.GCP_SA_KEY }}" | docker login -u _json_key --password-stdin us-east1-docker.pkg.dev
            fi

            # Pull latest image
            docker pull $IMAGE_NAME

            # Start ORBD (Naming Service)
            docker run -d --name corba-orbd --network corba-net -p ${ORB_PORT}:${ORB_PORT} \
              eclipse-temurin:8-jdk \
              orbd -ORBInitialPort ${ORB_PORT} -ORBInitialHost 0.0.0.0 -ORBListenEndpoints "giop:tcp://0.0.0.0:${ORB_PORT}"

            # Start CORBA Buffer Server
            docker run -d --name corba-buffer --network corba-net -p ${SERVER_PORT}:${SERVER_PORT} \
              -e JAVA_TOOL_OPTIONS="-Dcom.sun.corba.se.ORBServerHost=${PUBLIC_IP} -Dcom.sun.corba.se.ORBServerPort=${SERVER_PORT}" \
              $IMAGE_NAME \
              -ORBInitialHost corba-orbd \
              -ORBInitialPort ${ORB_PORT} \
              -ORBProxyHost ${PUBLIC_IP} \
              -ORBProxyPort ${ORB_PORT}
          '

      # Optional: Display logs from the containers
      - name: Display Server Logs
        if: always()
        run: |
          ssh ubuntu@${{ secrets.SSH_HOST }} "echo '=== ORBD (last 20 lines) ===' && docker logs --tail 20 corba-orbd || echo 'No ORBD logs'"
          ssh ubuntu@${{ secrets.SSH_HOST }} "echo '=== CORBA Server (last 20 lines) ===' && docker logs --tail 20 corba-buffer || echo 'No server logs'"
