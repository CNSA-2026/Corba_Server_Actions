name: Docker-Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

  # IMAGE_NAME: "us-east1-docker.pkg.dev/cnsa-2026/docker-repo/corba-actions:latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      # Set up Java 8 - CRITICAL: CORBA requires Java 8 (removed from Java 11+)
      - name: Set up JDK 8
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # Verify Java version
      - name: Verify Java Version
        run: java -version

      # Build with Maven (generate CORBA code, compile, package)
      - name: Build with Maven
        run: mvn clean package -DskipTests
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Docker login to Artifact Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: us-east1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.IMAGE_NAME }} .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ secrets.IMAGE_NAME }}

      # Install SSH Key
      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2.8.1
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'

      # Add host to known_hosts
      - name: Add Known Hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # Deploy and Start CORBA Server
      - name: Deploy and Start CORBA Server
        run: |
          # 1. Guardar la clave JSON en un archivo seguro en el runner de GitHub
          echo '${{ secrets.GCP_SA_KEY }}' > gcp_key.json

          # 2. Transferir el archivo de la clave a tu Máquina Virtual de forma segura
          scp -o StrictHostKeyChecking=no gcp_key.json ubuntu@${{ secrets.SSH_HOST }}:/tmp/gcp_key.json

          # 3. Conectarse por SSH y ejecutar el despliegue
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.SSH_HOST }} '
            set -e

            # Hacer login en Docker leyendo el archivo intacto (esto evita el error de formato)
            cat /tmp/gcp_key.json | docker login -u _json_key --password-stdin us-east1-docker.pkg.dev

            # Borrar la clave de la MV por seguridad
            rm /tmp/gcp_key.json

            # Definir variables
            PUBLIC_IP=34.69.229.246
            ORB_PORT=3000
            SERVER_PORT=8080
            IMAGE_NAME=${{ secrets.IMAGE_NAME }}

            # Limpieza previa
            docker stop corba-orbd corba-buffer >/dev/null 2>&1 || true
            docker rm -f corba-orbd corba-buffer >/dev/null 2>&1 || true

            # Pull de la nueva imagen
            docker pull $IMAGE_NAME

            # Crear red si no existe
            docker network create corba-net >/dev/null 2>&1 || true

            # Levantar Naming Service (ORBD)
            echo "Starting ORBD..."
            docker run -d --name corba-orbd --network corba-net -p ${ORB_PORT}:${ORB_PORT} \
              eclipse-temurin:8-jdk \
              orbd -ORBInitialPort ${ORB_PORT} -ORBInitialHost 0.0.0.0

            sleep 5

            # Levantar Servidor CORBA
            echo "Starting CORBA Buffer Server..."
            docker run -d --name corba-buffer --network corba-net -p ${SERVER_PORT}:${SERVER_PORT} \
              -e JAVA_TOOL_OPTIONS="-Dcom.sun.corba.se.ORBServerHost=${PUBLIC_IP} -Dcom.sun.corba.se.ORBServerPort=${SERVER_PORT}" \
              $IMAGE_NAME \
              -ORBInitialHost corba-orbd \
              -ORBInitialPort ${ORB_PORT}
            
            echo "✓ Despliegue completado con éxito"
          '

      # Optional: Display logs from the containers and append to GitHub job summary
      - name: Display Server Logs (append to GitHub summary)
        if: always()
        run: |
          echo "### ORBD (last 20 lines)" >> "$GITHUB_STEP_SUMMARY"
          ssh ubuntu@${{ secrets.SSH_HOST }} "docker logs --tail 20 corba-orbd || echo 'No ORBD logs'" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### CORBA Server (last 20 lines)" >> "$GITHUB_STEP_SUMMARY"
          ssh ubuntu@${{ secrets.SSH_HOST }} "docker logs --tail 20 corba-buffer || echo 'No server logs'" >> "$GITHUB_STEP_SUMMARY"
          echo "(Logs appended to GitHub Actions job summary)" >> "$GITHUB_STEP_SUMMARY"
